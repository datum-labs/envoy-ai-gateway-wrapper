apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-ai-gateway-dashboard
  labels:
    app.kubernetes.io/name: envoy-ai-gateway-dashboard
    app.kubernetes.io/instance: envoy-ai-gateway-dashboard
    app.kubernetes.io/version: 1.0.0
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy-ai-gateway-dashboard
      app.kubernetes.io/instance: envoy-ai-gateway-dashboard
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: envoy-ai-gateway-dashboard
        app.kubernetes.io/instance: envoy-ai-gateway-dashboard
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: envoy-ai-gateway-dashboard
          image: ghcr.io/datum-cloud/envoy-ai-gateway-dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /dashboard
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /dashboard
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
